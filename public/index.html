<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation Studio</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
            colors: {
              brand: {
                50: "#eff6ff",
                100: "#dbeafe",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
              },
              surface: { 800: "#1e1b2e", 900: "#13111c", 950: "#0c0a14" },
            },
          },
        },
      };
    </script>
    <style>
      body {
        background: #0c0a14;
        color: #e2e8f0;
        font-family: "Inter", sans-serif;
      }
      .glass {
        background: rgba(30, 27, 46, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .glass-hover:hover {
        background: rgba(40, 37, 56, 0.8);
        border-color: rgba(99, 102, 241, 0.3);
      }
      .shot-card {
        transition: all 0.2s;
      }
      .shot-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15);
      }
      .progress-bar {
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="dark min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useCallback, useRef } = React;
      const API = "http://175.127.189.188:3000/api";

      // ============================================================
      // 아이콘 컴포넌트
      // ============================================================
      const Icons = {
        Film: () => (

            <path d="M3 12h18" />
            <path d="M3 16.5h4" />
            <path d="M17 3v18" />
            <path d="M17 7.5h4" />
            <path d="M17 16.5h4" />
          </svg>
        ),
        Plus: () => (

            <path d="M5 12h14" />

        Image: () => (
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"

            strokeLinecap="round"
            strokeLinejoin="round"
          >

            <circle cx="9" cy="9" r="2" />
            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
          </svg>
        ),
        Play: () => (
          <svg
            xmlns="http://www.w3.org/2000/svg"

          >

        ),
        Check: () => (

            width="16"

            viewBox="0 0 24 24"

            stroke="currentColor"

          >
            <polyline points="20 6 9 17 4 12" />

        ),
        Refresh: () => (
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"

          >

            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />

        ArrowLeft: () => (

          </svg>
        ),
        Upload: () => (
          <svg

          >

        Trash: () => (

      // ============================================================
      // 대시보드
      // ============================================================
      function Dashboard({ onNavigate }) {
        const [episodes, setEpisodes] = useState([]);
        const [showCreate, setShowCreate] = useState(false);

        useEffect(() => {
          fetch(`${API}/episodes`)
            .then((r) => r.json())
            .then(setEpisodes)
            .catch(() => {});
        }, []);

        const createEpisode = async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const res = await fetch(`${API}/episodes`, {
            method: "POST",
            body: fd,
          });
          const data = await res.json();
          setShowCreate(false);
          setEpisodes((prev) => [...prev, data]);
        };

        return (
          <div className="fade-in">
            <div className="flex items-center justify-between mb-8">
              <div>
                <h2 className="text-2xl font-bold text-white">에피소드</h2>
                <p className="text-slate-400 mt-1 text-sm">
                  시즌 1: 이코노미아
                </p>
              </div>
              <button
                onClick={() => setShowCreate(true)}
                className="flex items-center gap-2 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-medium transition-colors cursor-pointer"
              >
                <Icons.Plus /> 에피소드 추가
              </button>
            </div>

            {showCreate && (
              <div className="glass rounded-2xl p-6 mb-6 fade-in">
                <form onSubmit={createEpisode} className="flex gap-4 items-end">
                  <div className="flex-1">
                    <label className="block text-xs text-slate-400 mb-1">
                      제목
                    </label>
                    <input
                      name="title"
                      required
                      className="w-full bg-surface-950 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"
                      placeholder="토리의 용돈"
                    />
                  </div>
                  <div className="w-24">
                    <label className="block text-xs text-slate-400 mb-1">
                      회차
                    </label>
                    <input
                      name="episode_number"
                      type="number"
                      defaultValue={episodes.length + 1}
                      className="w-full bg-surface-950 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"
                    />
                  </div>
                  <button
                    type="submit"
                    className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium text-white cursor-pointer"
                  >
                    생성
                  </button>
                  <button
                    type="button"
                    onClick={() => setShowCreate(false)}
                    className="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-lg text-sm text-slate-400 cursor-pointer"
                  >
                    취소
                  </button>
                </form>
              </div>
            )}

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
              {episodes.map((ep) => (
                <div
                  key={ep.id}
                  onClick={() => onNavigate("storyboard", ep.id)}
                  className="glass glass-hover rounded-2xl p-5 cursor-pointer shot-card"
                >
                  <div className="flex items-center gap-3 mb-3">
                    <div className="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center text-indigo-400">
                      <Icons.Film />
                    </div>
                    <div>
                      <div className="text-xs text-slate-500">{ep.id}</div>
                      <div className="font-semibold text-white">
                        {ep.title || "제목 없음"}
                      </div>
                    </div>
                  </div>
                  <div className="mt-3">
                    <div className="flex justify-between text-xs text-slate-400 mb-1.5">
                      <span>
                        {ep.completed_shots || 0} / {ep.total_shots || 0} 샷
                      </span>
                      <span>
                        {ep.total_shots
                          ? Math.round(
                              ((ep.completed_shots || 0) / ep.total_shots) *
                                100,
                            )
                          : 0}
                        %
                      </span>
                    </div>
                    <div className="h-1.5 bg-white/5 rounded-full overflow-hidden">
                      <div
                        className="h-full progress-bar rounded-full transition-all"
                        style={{
                          width: `${ep.total_shots ? ((ep.completed_shots || 0) / ep.total_shots) * 100 : 0}%`,
                        }}
                      />
                    </div>
                  </div>
                  <div className="mt-3 text-xs">
                    <span
                      className={`px-2 py-0.5 rounded-full ${
                        ep.status === "assembled"
                          ? "bg-green-500/20 text-green-400"
                          : ep.status === "draft"
                            ? "bg-slate-500/20 text-slate-400"
                            : "bg-amber-500/20 text-amber-400"
                      }`}
                    >
                      {ep.status === "assembled"
                        ? "완성"
                        : ep.status === "draft"
                          ? "작성중"
                          : ep.status}
                    </span>
                  </div>
                </div>
              ))}

              {episodes.length === 0 && (
                <div className="col-span-full text-center py-20 text-slate-500">
                  <Icons.Film />
                  <p className="mt-3">아직 에피소드가 없습니다</p>
                  <p className="text-sm mt-1">
                    위의 "에피소드 추가" 버튼을 눌러 시작하세요
                  </p>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ============================================================
      // 에셋 관리
      // ============================================================
      function AssetManager() {
        const [assets, setAssets] = useState([]);
        const [tab, setTab] = useState("character");
        const [showUpload, setShowUpload] = useState(false);

        useEffect(() => {
          fetch(`${API}/assets`)
            .then((r) => r.json())
            .then(setAssets)
            .catch(() => {});
        }, []);

        const filtered = assets.filter((a) => a.type === tab);

        const handleUpload = async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          await fetch(`${API}/assets`, { method: "POST", body: fd });
          setShowUpload(false);
          const res = await fetch(`${API}/assets`);
          setAssets(await res.json());
        };

        return (
          <div className="fade-in">
            <div className="flex items-center justify-between mb-6">
              <h2 className="text-2xl font-bold text-white">에셋 관리</h2>
              <button
                onClick={() => setShowUpload(true)}
                className="flex items-center gap-2 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-medium cursor-pointer"
              >
                <Icons.Upload /> 에셋 추가
              </button>
            </div>

            <div className="flex gap-2 mb-6">
              {[
                ["character", "캐릭터"],
                ["background", "배경"],
                ["prop", "소품"],
              ].map(([key, label]) => (
                <button
                  key={key}
                  onClick={() => setTab(key)}
                  className={`px-4 py-2 rounded-xl text-sm font-medium cursor-pointer transition-colors ${
                    tab === key
                      ? "bg-indigo-600 text-white"
                      : "bg-white/5 text-slate-400 hover:bg-white/10"
                  }`}
                >
                  {label} ({assets.filter((a) => a.type === key).length})
                </button>
              ))}
            </div>

            {showUpload && (
              <div className="glass rounded-2xl p-6 mb-6 fade-in">
                <h3 className="text-lg font-semibold text-white mb-4">
                  에셋 추가
                </h3>
                <form onSubmit={handleUpload} className="space-y-4">
                  <input type="hidden" name="type" value={tab} />
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs text-slate-400 mb-1">
                        이름
                      </label>
                      <input
                        name="name"
                        required
                        className="w-full bg-surface-950 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"
                      />
                    </div>
                    <div>
                      <label className="block text-xs text-slate-400 mb-1">
                        AI 프롬프트 설명
                      </label>
                      <input
                        name="prompt_description"
                        className="w-full bg-surface-950 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"
                        placeholder="a 5-year-old boy with blue hair..."
                      />
                    </div>
                  </div>
                  <div className="grid grid-cols-3 gap-4">
                    {["정면 (front)", "측면 (side)", "후면 (back)"].map(
                      (label, i) => (
                        <div key={i}>
                          <label className="block text-xs text-slate-400 mb-1">
                            {label}
                          </label>
                          <input
                            type="file"
                            name={
                              ["front_image", "side_image", "back_image"][i]
                            }
                            accept="image/*"
                            className="w-full text-xs text-slate-400 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-indigo-600/20 file:text-indigo-400 file:cursor-pointer"
                          />
                        </div>
                      ),
                    )}
                  </div>
                  <div className="flex gap-2">
                    <button
                      type="submit"
                      className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium text-white cursor-pointer"
                    >
                      업로드
                    </button>
                    <button
                      type="button"
                      onClick={() => setShowUpload(false)}
                      className="px-4 py-2 bg-white/5 rounded-lg text-sm text-slate-400 cursor-pointer"
                    >
                      취소
                    </button>
                  </div>
                </form>
              </div>
            )}

            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
              {filtered.map((asset) => (
                <div
                  key={asset.id}
                  className="glass rounded-2xl p-4 shot-card cursor-pointer"
                >
                  <div className="aspect-square rounded-xl bg-surface-950 mb-3 overflow-hidden flex items-center justify-center">
                    {asset.front_image ? (
                      <img
                        src={`${API}/file${asset.front_image}`}
                        alt={asset.name}
                        className="w-full h-full object-contain"
                      />
                    ) : (
                      <Icons.Image />
                    )}
                  </div>
                  <div className="font-medium text-white text-sm">
                    {asset.name}
                  </div>
                  <div className="text-xs text-slate-500 mt-0.5 truncate">
                    {asset.prompt_description || "설명 없음"}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // ============================================================
      // 스토리보드 편집기
      // ============================================================
      function StoryboardEditor({ episodeId, onNavigate }) {
        const [episode, setEpisode] = useState(null);
        const [selectedShot, setSelectedShot] = useState(null);
        const [generating, setGenerating] = useState({});

        const loadEpisode = useCallback(() => {
          fetch(`${API}/episodes/${episodeId}`)
            .then((r) => r.json())
            .then((data) => {
              setEpisode(data);
              if (!selectedShot && data.shots?.length)
                setSelectedShot(data.shots[0]);
            });
        }, [episodeId]);

        useEffect(() => {
          loadEpisode();
        }, [loadEpisode]);

        const generateShot = async (shotId) => {
          setGenerating((prev) => ({ ...prev, [shotId]: true }));
          try {
            const res = await fetch(`${API}/shots/${shotId}/generate`, {
              method: "POST",
            });
            const { task_id } = await res.json();
            // 폴링
            const poll = setInterval(async () => {
              const status = await fetch(`${API}/tasks/${task_id}`).then((r) =>
                r.json(),
              );
              if (status.status === "completed" || status.status === "failed") {
                clearInterval(poll);
                setGenerating((prev) => ({ ...prev, [shotId]: false }));
                loadEpisode();
              }
            }, 3000);
          } catch {
            setGenerating((prev) => ({ ...prev, [shotId]: false }));
          }
        };

        const updateShot = async (shotId, field, value) => {
          const fd = new FormData();
          fd.append(field, value);
          await fetch(`${API}/shots/${shotId}`, { method: "PUT", body: fd });
          loadEpisode();
        };

        const assemble = async () => {
          const res = await fetch(`${API}/episodes/${episodeId}/assemble`, {
            method: "POST",
          });
          if (res.ok) {
            const data = await res.json();
            alert(`조립 완료! ${data.shots}샷, ${data.size_mb}MB`);
            loadEpisode();
          }
        };

        if (!episode)
          return (
            <div className="text-slate-500 text-center py-20">로딩 중...</div>
          );

        const shot = selectedShot;

        return (
          <div className="fade-in">
            <div className="flex items-center justify-between mb-6">
              <div className="flex items-center gap-3">
                <button
                  onClick={() => onNavigate("dashboard")}
                  className="p-2 rounded-lg bg-white/5 hover:bg-white/10 cursor-pointer"
                >
                  <Icons.ArrowLeft />
                </button>
                <div>
                  <h2 className="text-xl font-bold text-white">
                    {episode.id}: {episode.title}
                  </h2>
                  <p className="text-sm text-slate-400">
                    {episode.completed_shots || 0} / {episode.total_shots || 0}{" "}
                    샷 완료
                  </p>
                </div>
              </div>
              <div className="flex gap-2">
                <button
                  onClick={() => onNavigate("preview", episodeId)}
                  className="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl text-sm text-white cursor-pointer"
                >
                  <Icons.Play /> 미리보기
                </button>
                <button
                  onClick={assemble}
                  className="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-sm font-medium text-white cursor-pointer"
                >
                  <Icons.Sparkles /> 영상 조립
                </button>
              </div>
            </div>

            {/* 샷 타임라인 */}
            <div className="glass rounded-2xl p-4 mb-6 overflow-x-auto">
              <div className="flex gap-2 min-w-max">
                {(episode.shots || []).map((s, i) => (
                  <button
                    key={s.id}
                    onClick={() => setSelectedShot(s)}
                    className={`flex-shrink-0 w-16 h-16 rounded-xl flex flex-col items-center justify-center text-xs font-medium cursor-pointer transition-all ${
                      selectedShot?.id === s.id
                        ? "bg-indigo-600 text-white ring-2 ring-indigo-400"
                        : s.status === "completed"
                          ? "bg-green-500/20 text-green-400 hover:bg-green-500/30"
                          : s.status === "generating"
                            ? "bg-amber-500/20 text-amber-400"
                            : s.status === "failed"
                              ? "bg-red-500/20 text-red-400"
                              : "bg-white/5 text-slate-400 hover:bg-white/10"
                    }`}
                  >
                    <span>S{String(s.shot_number).padStart(2, "0")}</span>
                    {s.status === "completed" && <Icons.Check />}
                    {generating[s.id] && (
                      <span className="animate-spin text-[10px]">...</span>
                    )}
                  </button>
                ))}
              </div>
            </div>

            {/* 선택된 샷 편집 */}
            {shot && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                {/* 왼쪽: 미리보기 */}
                <div className="space-y-4">
                  <div className="glass rounded-2xl overflow-hidden">
                    {shot.video_path ? (
                      <video
                        src={`${API}/file${shot.video_path}`}
                        controls
                        className="w-full aspect-video bg-black"
                      />
                    ) : shot.composite_path ? (
                      <img
                        src={`${API}/file${shot.composite_path}`}
                        alt="합성"
                        className="w-full aspect-video object-contain bg-surface-950"
                      />
                    ) : shot.sketch_path ? (
                      <img
                        src={`${API}/file${shot.sketch_path}`}
                        alt="콘티"
                        className="w-full aspect-video object-contain bg-white/5"
                      />
                    ) : (
                      <div className="w-full aspect-video bg-surface-950 flex items-center justify-center text-slate-500">
                        미리보기 없음
                      </div>
                    )}
                  </div>

                  <div className="glass rounded-xl p-3">
                    {shot.sketch_path ? (
                      <div className="flex items-center gap-4">
                        <img src={`${API}/file${shot.sketch_path}`} alt="콘티" className="w-28 h-20 object-contain rounded bg-white/5 border border-white/10" />
                        <div className="flex-1">
                          <div className="text-xs font-medium text-indigo-400 mb-1">원본 콘티 스케치</div>
                          <div className="text-xs text-slate-500" style={{maxHeight: "2.5em", overflow: "hidden"}}>{shot.scene_description}</div>
                          <label className="mt-2 inline-flex items-center gap-1 text-xs text-slate-500 hover:text-indigo-400 cursor-pointer">
                            <Icons.Upload />교체
                            <input type="file" accept="image/*" className="hidden" onChange={async (e) => {
                              const file = e.target.files[0];
                              if (!file) return;
                              const fd = new FormData();
                              fd.append("file", file);
                              await fetch(`${API}/shots/${shot.id}/sketch`, {method: "POST", body: fd});
                              loadEpisode();
                            }} />
                          </label>
                        </div>
                      </div>
                    ) : (
                      <label className="flex flex-col items-center justify-center py-4 border-2 border-dashed border-white/10 rounded-xl hover:border-indigo-500/50 cursor-pointer transition-colors">
                        <Icons.Upload />
                        <span className="text-xs text-slate-400 mt-2">콘티 스케치 업로드</span>
                        <span className="text-xs text-slate-600 mt-0.5">클릭 또는 드래그</span>
                        <input type="file" accept="image/*" className="hidden" onChange={async (e) => {
                          const file = e.target.files[0];
                          if (!file) return;
                          const fd = new FormData();
                          fd.append("file", file);
                          await fetch(`${API}/shots/${shot.id}/sketch`, {method: "POST", body: fd});
                          loadEpisode();
                        }} />
                      </label>
                    )}
                  </div>

                  <div className="flex gap-2">
                    <button
                      onClick={() => generateShot(shot.id)}
                      disabled={generating[shot.id]}
                      className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-medium cursor-pointer transition-colors ${
                        generating[shot.id]
                          ? "bg-amber-500/20 text-amber-400"
                          : "bg-indigo-600 hover:bg-indigo-500 text-white"
                      }`}
                    >
                      {generating[shot.id] ? (
                        <><Icons.Refresh /> 생성중...</>
                      ) : (
                        <><Icons.Sparkles /> {shot.video_path ? "재생성" : "생성"}</>
                      )}
                    </button>
                    {shot.video_path && (
                      <button className="px-4 py-2.5 bg-green-600/20 text-green-400 rounded-xl text-sm font-medium cursor-pointer hover:bg-green-600/30">
                        <Icons.Check /> 승인
                      </button>
                    )}
                  </div>
                </div>

                {/* 오른쪽: 편집 */}
                <div className="glass rounded-2xl p-6 space-y-4">
                  <div className="flex items-center justify-between">
                    <h3 className="font-semibold text-white">{shot.id}</h3>
                    <span
                      className={`text-xs px-2 py-0.5 rounded-full ${
                        shot.status === "completed"
                          ? "bg-green-500/20 text-green-400"
                          : shot.status === "failed"
                            ? "bg-red-500/20 text-red-400"
                            : "bg-slate-500/20 text-slate-400"
                      }`}
                    >
                      {shot.status}
                    </span>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1">
                      장면 설명
                    </label>
                    <textarea
                      defaultValue={shot.scene_description}
                      rows={2}
                      onBlur={(e) =>
                        updateShot(shot.id, "scene_description", e.target.value)
                      }
                      className="w-full bg-surface-950 border border-white/10 rounded-lg px-3 py-2 text-sm text-white resize-none focus:outline-none focus:border-indigo-500"
                    />
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1">
                      AI 프롬프트
                    </label>
                    <textarea
                      defaultValue={shot.prompt}
                      rows={4}
                      onBlur={(e) =>
                        updateShot(shot.id, "prompt", e.target.value)
                      }
                      className="w-full bg-surface-950 border border-white/10 rounded-lg px-3 py-2 text-sm text-white resize-none focus:outline-none focus:border-indigo-500"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs text-slate-400 mb-1">
                        배경
                      </label>
                      <select
                        defaultValue={shot.environment}
                        onChange={(e) =>
                          updateShot(shot.id, "environment", e.target.value)
                        }
                        className="w-full bg-surface-950 border border-white/10 rounded-lg px-3 py-2 text-sm text-white cursor-pointer focus:outline-none focus:border-indigo-500"
                      >
                        <option value="stationery_int">문구점 내부</option>
                        <option value="stationery_ext">문구점 외부</option>
                        <option value="golden_castle">황금 캐슬</option>
                        <option value="dark_castle">다크 캐슬</option>
                        <option value="dark_interior">다크 캐슬 내부</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs text-slate-400 mb-1">
                        카메라
                      </label>
                      <select
                        defaultValue={shot.camera_type}
                        onChange={(e) =>
                          updateShot(shot.id, "camera_type", e.target.value)
                        }
                        className="w-full bg-surface-950 border border-white/10 rounded-lg px-3 py-2 text-sm text-white cursor-pointer focus:outline-none focus:border-indigo-500"
                      >
                        <option value="wide">와이드</option>
                        <option value="medium">미디엄</option>
                        <option value="closeup">클로즈업</option>
                        <option value="extreme_closeup">
                          익스트림 클로즈업
                        </option>
                      </select>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs text-slate-400 mb-1">
                        대사 화자
                      </label>
                      <input
                        defaultValue={shot.dialogue_speaker}
                        onBlur={(e) =>
                          updateShot(
                            shot.id,
                            "dialogue_speaker",
                            e.target.value,
                          )
                        }
                        className="w-full bg-surface-950 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"
                      />
                    </div>
                    <div>
                      <label className="block text-xs text-slate-400 mb-1">
                        대사
                      </label>
                      <input
                        defaultValue={shot.dialogue_text}
                        onBlur={(e) =>
                          updateShot(shot.id, "dialogue_text", e.target.value)
                        }
                        className="w-full bg-surface-950 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"
                      />
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ============================================================
      // 영상 뷰어
      // ============================================================
      function VideoPreview({ episodeId, onNavigate }) {
        const [episode, setEpisode] = useState(null);

        useEffect(() => {
          fetch(`${API}/episodes/${episodeId}`)
            .then((r) => r.json())
            .then(setEpisode);
        }, [episodeId]);

        if (!episode) return null;

        const finalPath = episode.final_video_path;

        return (
          <div className="fade-in">
            <div className="flex items-center gap-3 mb-6">
              <button
                onClick={() => onNavigate("storyboard", episodeId)}
                className="p-2 rounded-lg bg-white/5 hover:bg-white/10 cursor-pointer"
              >
                <Icons.ArrowLeft />
              </button>
              <h2 className="text-xl font-bold text-white">
                {episode.title} 미리보기
              </h2>
            </div>

            {finalPath ? (
              <div className="glass rounded-2xl overflow-hidden">
                <video
                  src={`${API}/file${finalPath}`}
                  controls
                  className="w-full aspect-video bg-black"
                />
              </div>
            ) : (
              <div className="glass rounded-2xl p-20 text-center text-slate-500">
                <p>아직 조립된 영상이 없습니다</p>
                <p className="text-sm mt-2">
                  스토리보드에서 [영상 조립]을 실행하세요
                </p>
              </div>
            )}

            {/* 샷 타임라인 */}
            <div className="mt-6 grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-3">
              {(episode.shots || [])
                .filter((s) => s.video_path)
                .map((s) => (
                  <div
                    key={s.id}
                    className="glass rounded-xl overflow-hidden cursor-pointer shot-card"
                  >
                    <video
                      src={`${API}/file${s.video_path}`}
                      className="w-full aspect-video bg-black"
                      muted
                    />
                    <div className="p-2 text-xs text-slate-400 text-center">
                      {s.id}
                    </div>
                  </div>
                ))}
            </div>
          </div>
        );
      }

      // ============================================================
      // 앱 라우터
      // ============================================================
      function App() {
        const [page, setPage] = useState("dashboard");
        const [pageParam, setPageParam] = useState(null);

        const navigate = (target, param = null) => {
          setPage(target);
          setPageParam(param);
        };

        return (
          <div className="min-h-screen">
            {/* 네비게이션 */}
            <nav className="sticky top-0 z-50 glass border-b border-white/5">
              <div className="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
                <div className="flex items-center gap-6">
                  <span
                    className="text-lg font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent cursor-pointer"
                    onClick={() => navigate("dashboard")}
                  >
                    Animation Studio
                  </span>
                  <div className="flex gap-1">
                    {[
                      ["dashboard", "대시보드"],
                      ["assets", "에셋"],
                    ].map(([key, label]) => (
                      <button
                        key={key}
                        onClick={() => navigate(key)}
                        className={`px-3 py-1.5 rounded-lg text-sm cursor-pointer transition-colors ${
                          page === key
                            ? "bg-indigo-600/20 text-indigo-400 font-medium"
                            : "text-slate-400 hover:text-white hover:bg-white/5"
                        }`}
                      >
                        {label}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="text-xs text-slate-500">TEDONG</div>
              </div>
            </nav>

            {/* 페이지 콘텐츠 */}
            <main className="max-w-7xl mx-auto px-6 py-8">
              {page === "dashboard" && <Dashboard onNavigate={navigate} />}
              {page === "assets" && <AssetManager />}
              {page === "storyboard" && (
                <StoryboardEditor episodeId={pageParam} onNavigate={navigate} />
              )}
              {page === "preview" && (
                <VideoPreview episodeId={pageParam} onNavigate={navigate} />
              )}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
</html>
